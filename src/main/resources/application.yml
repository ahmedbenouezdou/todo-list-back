spring:
  profiles:
    active: "@activatedProperties@"
  application:
    name: todo-list-back
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/todolistdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

springdoc:
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: false
    displayRequestDuration: false

server:
  port: 8080

serveur:
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}